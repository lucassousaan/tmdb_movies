name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          echo "TMDB_API_KEY=test_key" > .env
          echo "BASE_URL=https://api.themoviedb.org/3" >> .env

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test
